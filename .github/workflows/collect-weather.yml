name: Collect Weather Data

on:
  schedule:
    # Every 10 minutes. GitHub Actions minimum is 5 min; 10 is plenty for our use case.
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    name: Trigger weather collection
    steps:
      - name: Call collect endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/collect_response.json -w "%{http_code}" \
            -X POST \
            -H "x-collect-secret: ${{ secrets.COLLECT_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://yellow-dune-096355110.2.azurestaticapps.net/api/weather/collect")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/collect_response.json)"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Collection failed with status $HTTP_STATUS"
            exit 1
          fi
